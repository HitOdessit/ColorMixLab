version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "androidx.compose*"
      testing:
        patterns:
          - "junit*"
          - "*kotlin-test*"
          - "*coroutines-test*"
      tooling:
        patterns:
          - "*detekt*"
          - "*spotless*"
          - "*kover*"
          - "*ktlint*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
