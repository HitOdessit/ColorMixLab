# Dependabot configuration.
#
# Each ignore rule below documents *why* it exists. The point is to break
# Dependabot's monthly cycle of re-proposing bumps that we already evaluated
# and rejected for a coordination reason — without permanently freezing
# anything that's safe to flow.
#
# When the underlying blocker is resolved (AGP bumped, Kotlin Clock migration
# done), remove the corresponding ignore.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      # AGP is fully ignored, not just majors. Even AGP minor bumps within 8.x
      # raise the minimum Gradle wrapper version (closed #18: 9.x needs Gradle
      # 9.4.1+; closed #19: 8.13.x needs Gradle 8.13+; we're on 8.10).
      # Dependabot can't bump the wrapper in the same PR, so every AGP bump
      # CI-fails on the version-check plugin. AGP, Gradle wrapper, and
      # Compose UI move together — re-evaluate as a deliberate joint upgrade.
      - dependency-name: "com.android.application"
      - dependency-name: "com.android.library"
      - dependency-name: "com.android.tools.build:gradle"

      # androidx.compose UI 1.9+ (pulled by recent compose-bom and any
      # androidx.* group bump) requires AGP 8.6+. Closed PRs #13, #14
      # documented this. Re-enable after AGP is bumped.
      - dependency-name: "androidx.compose:compose-bom"
      - dependency-name: "androidx.compose.*"
      - dependency-name: "androidx.activity:activity-compose"
      - dependency-name: "androidx.lifecycle:*"
      - dependency-name: "androidx.core:core-ktx"

      # Kotlin Gradle Plugin 2.4.0+ enforces a minimum AGP of 8.5.2 at
      # plugin-apply time (KGP <-> AGP version-compatibility check). AGP is
      # frozen at 8.3.0 above, so a Kotlin 2.4.0 bump fails EVERY Gradle-based
      # check — Android Build & Test, CodeQL's manual build, and Code Quality —
      # at configuration time (this is exactly what reverted #26 did). The
      # kotlin group is otherwise safe to flow within 2.3.x, so pin the floor
      # rather than freezing the whole group. Re-enable 2.4.0+ after the joint
      # AGP/Gradle/Compose upgrade. (No kotlinx.* artifact is near 2.4.0, so
      # this floor only affects the Kotlin toolchain itself.)
      - dependency-name: "org.jetbrains.kotlin*"
        versions: [">=2.4.0"]

      # kotlinx-datetime 0.7+ removes Clock.System; commonMain still imports
      # kotlinx.datetime.Clock directly (GameController.kt, LeaderboardEntry.kt,
      # LeaderboardManager.kt — see closed PR #12). Re-enable after the
      # source migration to kotlin.time.Clock.
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-datetime"

    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
        # kotlinx-datetime is excluded by the per-package ignore above.
      tooling:
        patterns:
          - "*detekt*"
          - "*spotless*"
          - "*kover*"
          - "*ktlint*"
          - "app.cash.paparazzi*"
      testing:
        patterns:
          - "junit*"
          - "*kotlin-test*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
