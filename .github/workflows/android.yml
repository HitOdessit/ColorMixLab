name: Android Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947  # v4

      - name: Spotless check
        run: ./gradlew spotlessCheck
        continue-on-error: true

      - name: Detekt
        run: ./gradlew detekt
        continue-on-error: true

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947  # v4

      - name: Build and test
        run: ./gradlew build koverXmlReport -x :shared:linkDebugFrameworkIosArm64 -x :shared:linkDebugFrameworkIosX64 -x :shared:linkDebugFrameworkIosSimulatorArm64 -x :shared:linkReleaseFrameworkIosArm64 -x :shared:linkReleaseFrameworkIosX64 -x :shared:linkReleaseFrameworkIosSimulatorArm64

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        if: success()
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: success()
        with:
          name: colormixlab-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
