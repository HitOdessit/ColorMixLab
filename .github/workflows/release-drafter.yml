name: Release Drafter

# Trigger on push to master only. The previous `pull_request` trigger ran on
# every Dependabot PR with the restricted GITHUB_TOKEN those workflows get,
# which doesn't have `contents: write` — release-drafter then failed to update
# the draft and surfaced as a red check on every Dependabot PR. Push events
# from master have full token permissions and are sufficient: a release draft
# only needs updating when commits actually land.
on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2  # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
