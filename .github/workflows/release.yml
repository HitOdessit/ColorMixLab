name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
