name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
