name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/colormixlab-${GITHUB_REF_NAME}-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
